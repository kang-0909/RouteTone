name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Show Swift Version
        run: swift --version

      - name: Package App
        run: ./Scripts/package-release.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/RouteTone-${{ github.ref_name }}.zip
            dist/RouteTone-${{ github.ref_name }}.zip.sha256
          generate_release_notes: true
